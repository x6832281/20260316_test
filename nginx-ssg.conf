# SSG rewrite: /article.html?id=xxx → /article/xxx.html
# Place this in the server block of your Nginx config.
# Example: include /path/to/nginx-ssg.conf;

location /article.html {
    if ($arg_id ~ "^[a-z0-9-]+$") {
        rewrite ^ /article/$arg_id.html? last;
    }
}

# Cache static assets aggressively (hashed filenames)
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# Cache generated article pages
location /article/ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
}

# Cache JS modules (copied as-is, use ?v= for cache busting)
location /scripts/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
