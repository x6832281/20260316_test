<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="A curated collection of popular AI tools from around the world, including both global and Chinese AI assistants. Updated for Vercel deployment.">
    <meta name="theme-color" content="#FFF9F5">
    <title>AI Tools Macaron</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>AI Tools Macaron</h1>
        </header>

        <section class="search-section">
            <input type="text" id="search-input" placeholder="Search for AI tools..." class="search-input" aria-label="Search keywords">
            <nav class="search-buttons" aria-label="Search engines">
                <button onclick="search('google')" class="search-btn" data-engine="google">Google</button>
                <button onclick="search('yandex')" class="search-btn" data-engine="yandex">Yandex</button>
                <button onclick="search('baidu')" class="search-btn" data-engine="baidu">百度</button>
                <button onclick="search('doubao')" class="search-btn" data-engine="doubao">豆包</button>
            </nav>
        </section>

        <main class="main-content">
            <section class="content">
                <section class="section" aria-label="Global AI Tools">
                    <div class="section-header">
                        <h2 class="section-title"></h2>
                        <p class="section-subtitle"></p>
                    </div>
                    <div class="tool-grid">
                        <a href="https://github.com/" target="_blank" class="tool-card-link" aria-label="GitHub - 全球最大的代码托管平台">
                            <article class="tool-card">
                                <h2>GitHub</h2>
                                <p>全球最大的代码托管平台</p>
                            </article>
                        </a>
                        <a href="https://www.weidus.com/" target="_blank" class="tool-card-link" aria-label="维度导航 - 专注每日推荐优质免费资源网址的导航">
                            <article class="tool-card">
                                <h2>维度导航</h2>
                                <p>专注每日推荐优质免费资源网址的导航</p>
                            </article>
                        </a>
                        <a href="https://ai-bot.cn/" target="_blank" class="tool-card-link" aria-label="AI工具集 - 1000+ AI工具集合，国内外AI工具集导航大全">
                            <article class="tool-card">
                                <h2>AI工具集</h2>
                                <p>1000+ AI工具集合，国内外AI工具集导航大全</p>
                            </article>
                        </a>
                    </div>
                </section>
            
                <section class="section" aria-label="Chinese AI Tools">
                    <div class="section-header">
                        <h2 class="section-title"></h2>
                        <p class="section-subtitle"></p>
                    </div>
                    <div class="tool-grid">
                        <a href="https://www.deepseek.com/" target="_blank" class="tool-card-link" aria-label="DeepSeek - 深度求索开发的智能对话助手">
                            <article class="tool-card">
                                <h2>DeepSeek</h2>
                                <p>深度求索开发的智能对话助手</p>
                            </article>
                        </a>
                        <a href="https://yiyan.baidu.com/" target="_blank" class="tool-card-link" aria-label="文心一言 - 百度开发的智能对话助手">
                            <article class="tool-card">
                                <h2>文心一言</h2>
                                <p>百度开发的智能对话助手</p>
                            </article>
                        </a>
                        <a href="https://tongyi.aliyun.com/" target="_blank" class="tool-card-link" aria-label="千问 - 阿里巴巴开发的智能对话工具">
                            <article class="tool-card">
                                <h2>千问</h2>
                                <p>阿里巴巴开发的智能对话工具</p>
                            </article>
                        </a>
                    </div>
                </section>
            </section>

            <aside class="message-display-sidebar">
                <section class="sidebar-section" aria-label="留言展示">
                    <h3 class="sidebar-title">
                        留言展示
                        <button id="toggle-message-btn" class="toggle-btn" aria-label="折叠/展开留言">
                            <span class="toggle-icon">−</span>
                        </button>
                    </h3>
                    <div id="message-list" class="message-list">
                        <!-- 留言将显示在这里 -->
                    </div>
                </section>
            </aside>

        </main>

        <aside class="sidebar">
            <section class="sidebar-section" aria-label="留言板">
                <h3 class="sidebar-title">留言板</h3>
                <div class="message-board">
                    <form id="message-form" class="message-form">
                        <div class="form-group">
                            <label for="name" class="form-label">名字</label>
                            <input type="text" id="name" class="form-input" placeholder="请输入您的名字" required>
                        </div>
                        <div class="form-group">
                            <label for="message" class="form-label">留言内容</label>
                            <textarea id="message" class="form-textarea" placeholder="请输入您的留言" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="form-submit">提交留言</button>
                    </form>
                </div>
            </section>
        </aside>

        <footer class="footer">
            <p>&copy; 2026 AI Tools Magazine. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
