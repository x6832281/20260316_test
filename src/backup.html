    <script>
        const TYPE_CONFIG = {
            '项目': { icon: '🚀', cls: 'project', label: '项目' },
            '书摘': { icon: '📖', cls: 'book', label: '书摘' },
            '教程': { icon: '🎓', cls: 'tutorial', label: '教程' },
            'skill': { icon: '🛠️', cls: 'skill', label: 'Skill' },
            '理论': { icon: '🧠', cls: 'theory', label: '理论' }
        };

        const BASE_PATH = 'data/历史备份/';
        const TYPE_FOLDERS = ['项目', '书摘', '教程', 'skill', '理论'];

        async function loadBackupData() {
            const allItems = {};

            for (const folder of TYPE_FOLDERS) {
                const items = [];
                try {
                    const dirPath = BASE_PATH + folder + '/';
                    const encodedDirPath = encodeURI(dirPath);
                    const dirResponse = await fetch(encodedDirPath);

                    if (dirResponse.ok) {
                        const html = await dirResponse.text();
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        const links = doc.querySelectorAll('a[href$=".md"]');
                        const mdFiles = [];

                        links.forEach(link => {
                            const href = link.getAttribute('href');
                            if (href) {
                                const fileName = href.split('/').pop();
                                if (fileName.endsWith('.md') && fileName !== '说明.md') {
                                    mdFiles.push({ href: href, name: decodeURIComponent(fileName) });
                                }
                            }
                        });

                        for (const file of mdFiles) {
                            try {
                                const fileUrl = encodedDirPath + file.href;
                                const fileResponse = await fetch(fileUrl);
                                if (fileResponse.ok) {
                                    const content = await fileResponse.text();

                                    const titleMatch = content.match(/^# (.+)$/m);
                                    const title = titleMatch ? titleMatch[1].trim() : file.name.replace('.md', '');

                                    const dateMatch = content.match(/\*\*(?:日期|发布时间|更新日期|备份日期)\*\*[：:]\s*(.+)$/m);
                                    const date = dateMatch ? dateMatch[1].trim() : '';

                                    const descMatch = content.match(/^##?\s*(?:📌\s*一句话总结|📝\s*概述|简介|摘要)\s*\n+([^\n#]{10,200})/m);
                                    let desc = '';
                                    if (descMatch && descMatch[1]) {
                                        desc = descMatch[1].trim();
                                    } else {
                                        const lines = content.split('\n');
                                        for (let i = 2; i < Math.min(lines.length, 30); i++) {
                                            const line = lines[i].trim();
                                            if (line.length > 20 && !line.startsWith('#') && !line.startsWith('**') && !line.startsWith('- ') && !line.startsWith('|')) {
                                                desc = line.substring(0, 120);
                                                break;
                                            }
                                        }
                                    }

                                    items.push({
                                        id: folder + '-' + file.name.replace('.md', ''),
                                        title: title,
                                        type: folder,
                                        date: date,
                                        desc: desc,
                                        fileUrl: fileUrl,
                                        fileName: file.name
                                    });
                                }
                            } catch (e) {
                                console.error('Error loading', file.name, e);
                            }
                        }
                    }
                } catch (e) {
                    console.error('Error loading folder', folder, e);
                }

                items.sort((a, b) => {
                    if (a.date && b.date) return b.date.localeCompare(a.date);
                    return a.title.localeCompare(b.title);
                });

                allItems[folder] = items;
            }

            return allItems;
        }

        function renderBackupContent(allItems) {
            const container = document.getElementById('backup-content');
            if (!container) return;

            const totalCount = Object.values(allItems).reduce((sum, arr) => sum + arr.length, 0);

            if (totalCount === 0) {
                container.innerHTML = `
                    <div class="backup-empty">
                        <div class="backup-empty-icon">📭</div>
                        <p class="backup-empty-text">暂无历史备份文档</p>
                        <p class="backup-empty-hint">请将 MD 文档放入 data/历史备份/ 对应的分类文件夹中</p>
                    </div>
                `;
                return;
            }

            let html = '';

            for (const folder of TYPE_FOLDERS) {
                const items = allItems[folder] || [];
                if (items.length === 0) continue;

                const config = TYPE_CONFIG[folder] || { icon: '📄', cls: 'project', label: folder };
                const sectionId = 'section-' + folder;

                html += `
                <div class="backup-section" data-type="${folder}" id="${sectionId}">
                    <div class="backup-section-header">
                        <div class="backup-section-icon ${config.cls}">${config.icon}</div>
                        <h2 class="backup-section-title">${config.label}</h2>
                        <span class="backup-section-count">${items.length} 篇</span>
                        <div class="backup-section-line"></div>
                    </div>
                    <div class="backup-grid">
                        ${items.map(item => renderBackupCard(item, config)).join('')}
                    </div>
                </div>`;
            }

            container.innerHTML = html;

            document.getElementById('count-all').textContent = `(${totalCount})`;
            document.getElementById('count-project').textContent = `(${allItems['项目']?.length || 0})`;
            document.getElementById('count-book').textContent = `(${allItems['书摘']?.length || 0})`;
            document.getElementById('count-tutorial').textContent = `(${allItems['教程']?.length || 0})`;
            document.getElementById('count-skill').textContent = `(${allItems['skill']?.length || 0})`;
            document.getElementById('count-theory').textContent = `(${allItems['理论']?.length || 0})`;

            initFilterButtons(allItems);
        }

        function renderBackupCard(item, config) {
            const dateDisplay = item.date ? `<span class="backup-card-date">${item.date}</span>` : '';
            const descDisplay = item.desc ? `<p class="backup-card-desc">${escapeHtml(item.desc)}</p>` : '';

            return `
                <a href="${item.fileUrl}" target="_blank" class="backup-card ${config.cls}-card" title="查看完整文档">
                    <div class="backup-card-header">
                        <div class="backup-card-icon ${config.cls}">${config.icon}</div>
                        <span class="backup-card-tag ${config.cls}">${config.label}</span>
                    </div>
                    <h3 class="backup-card-title">${escapeHtml(item.title)}</h3>
                    ${descDisplay}
                    <div class="backup-card-footer">
                        ${dateDisplay}
                        <span class="backup-card-arrow">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3L11 8L6 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </span>
                    </div>
                </a>
            `;
        }

        function initFilterButtons(allItems) {
            const filterBtns = document.querySelectorAll('.backup-filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const type = btn.dataset.type;
                    const sections = document.querySelectorAll('.backup-section');

                    sections.forEach(section => {
                        if (type === 'all' || section.dataset.type === type) {
                            section.style.display = 'block';
                        } else {
                            section.style.display = 'none';
                        }
                    });

                    const targetSection = document.getElementById('section-' + type);
                    if (targetSection) {
                        targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function init() {
            const allItems = await loadBackupData();
            renderBackupContent(allItems);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
    <script src="./scripts/script.js" defer></script>
</body>
</html>
