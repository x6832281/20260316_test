    <script>
        const supabaseUrl = 'https://wutixqqiuksglbijggdu.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1dGl4cXFpdWtzZ2xiaWpnZ2R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzQ5NzAsImV4cCI6MjA4OTQxMDk3MH0.6y_uZrcSqcjOCz-8EaXZHmmnD28OAkcyNNBkX5JySBU';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

        const messageForm = document.getElementById('message-form');
        const messageList = document.getElementById('message-list');
        const toggleBtn = document.getElementById('toggle-btn');
        const toggleIcon = toggleBtn ? toggleBtn.querySelector('.toggle-icon') : null;
        let isExpanded = true;

        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                isExpanded = !isExpanded;
                messageList.classList.toggle('collapsed', !isExpanded);
                if (toggleIcon) {
                    toggleIcon.textContent = isExpanded ? '\u2212' : '\u002b';
                }
            });
        }

        if (messageForm) {
            messageForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('name').value.trim();
                const message = document.getElementById('message').value.trim();
                
                if (!name || !message) return;

                const submitBtn = messageForm.querySelector('.form-submit');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<span class="loading-dots">...</span>提交中';
                submitBtn.disabled = true;

                try {
                    const { error } = await supabaseClient
                        .from('message')
                        .insert({ name, message });
                    
                    if (error) throw error;
                    
                    messageForm.reset();
                    loadMessages();
                } catch (err) {
                    console.error('提交失败:', err);
                    saveToLocal({ name, message, created_at: new Date().toISOString() });
                    loadMessages();
                } finally {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });
        }

        async function loadMessages() {
            try {
                const { data: messages, error } = await supabaseClient
                    .from('message')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;
                displayMessages(messages);
                saveToLocalStorage(messages);
            } catch (err) {
                console.error('加载失败:', err);
                loadFromLocalStorage();
            }
        }

        function displayMessages(messages) {
            if (!messageList) return;
            messageList.innerHTML = '';

            if (!messages || messages.length === 0) {
                messageList.innerHTML = '<div class="empty-board"><p>暂无留言，来发表第一条吧！</p></div>';
                return;
            }

            messages.forEach(msg => {
                const item = document.createElement('div');
                item.className = 'board-item';
                item.innerHTML = `
                    <div class="board-item-header">
                        <span class="board-author">${escapeHtml(msg.name)}</span>
                        <span class="board-time">${formatTime(msg.created_at)}</span>
                    </div>
                    <div class="board-content">${escapeHtml(msg.message)}</div>
                `;
                messageList.appendChild(item);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        function saveToLocal(msg) {
            try {
                const messages = JSON.parse(localStorage.getItem('board_messages') || '[]');
                messages.unshift(msg);
                if (messages.length > 50) messages.splice(50);
                localStorage.setItem('board_messages', JSON.stringify(messages));
            } catch (e) {}
        }

        function saveToLocalStorage(messages) {
            try {
                localStorage.setItem('board_messages', JSON.stringify(messages));
            } catch (e) {}
        }

        function loadFromLocalStorage() {
            try {
                const messages = JSON.parse(localStorage.getItem('board_messages') || '[]');
                displayMessages(messages);
            } catch (e) {
                displayMessages([]);
            }
        }

        loadMessages();

        setInterval(loadMessages, 5000);

        const subscription = supabaseClient
            .channel('board-channel')
            .on('postgres_changes', 
                { event: 'INSERT', schema: 'public', table: 'message' },
                (payload) => {
                    loadMessages();
                }
            )
            .subscribe();
    </script>
